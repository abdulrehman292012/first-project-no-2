<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Theme Login & Signup Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                              url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 74, 90, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.5);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            border: 2px solid rgba(255, 74, 90, 0.7);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anime-banner {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            border-bottom: 2px solid rgba(255, 74, 90, 0.5);
        }

        .form-content {
            padding: 30px;
        }

        .form-container h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .password-hint {
            background-color: #ff4a5a;
            border-left: 5px solid #b31b28;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(255, 74, 90, 0.3);
            line-height: 1.5;
        }

        .password-hint u {
            font-weight: 700;
            background: rgba(0, 0, 0, 0.2);
            padding: 1px 4px;
            border-radius: 3px;
            text-decoration: none;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: 700;
        }

        .input-group input[type="text"],
        .input-group input[type="email"],
        .input-group input[type="password"],
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(226, 232, 240, 0.8);
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            color: #1a1a2e;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #ff4a5a;
            box-shadow: 0 0 12px rgba(255, 74, 90, 0.3);
            background: #ffffff;
        }

        .gender-group {
            margin-bottom: 18px;
        }

        .gender-group label {
            display: block;
            margin-bottom: 6px;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: 700;
        }

        .radio-inputs {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-inputs label {
            font-weight: 600;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .radio-inputs input[type="radio"] {
            accent-color: #ff4a5a;
            transform: scale(1.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff4a5a, #e03e4d);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 74, 90, 0.4);
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #e03e4d, #ff4a5a);
            box-shadow: 0 6px 20px rgba(255, 74, 90, 0.6);
            transform: translateY(-2px);
        }

        .links-divider {
            margin: 30px 0 20px 0;
            border: none;
            border-top: 2px dashed rgba(255, 74, 90, 0.4);
            position: relative;
            text-align: center;
        }

        .links-divider::after {
            content: "Otaku Zone";
            background: rgba(255, 255, 255, 0.95);
            padding: 0 15px;
            position: relative;
            top: -11px;
            color: #ff4a5a;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .links-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .web-link {
            display: inline-block;
            padding: 8px 16px;
            background-color: rgba(247, 250, 252, 0.85);
            color: #4a5568;
            text-decoration: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }

        .web-link:hover {
            background-color: #ff4a5a;
            color: white;
            border-color: #ff4a5a;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(255, 74, 90, 0.3);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=1000&auto=format&fit=crop" alt="Anime Banner" class="anime-banner">

        <div class="form-content">
            <h2>Join the Clan</h2>

            <div class="password-hint">
                <strong>Clan Credentials:</strong><br>
                Name: <u>Abdul rehman</u><br>
                Email: <u>abdulrehmanabc888@gmail.com</u><br>
                Password: <u>202606</u>
            </div>

            <form id="clanForm">
                <div class="input-group">
                    <label for="name">Ninja Name (Full Name)</label>
                    <input type="text" id="name" value="Abdul rehman" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" value="abdulrehmanabc888@gmail.com" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <div class="gender-group">
                    <label>Gender</label>
                    <div class="radio-inputs">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>

                <div class="input-group">
                    <label for="country">Country</label>
                    <select id="country" name="country" required>
                        <option value="pakistan" selected>Pakistan</option>
                        <option value="saudi_arabia">Saudi Arabia</option>
                        <option value="uae">UAE</option>
                        <option value="turkey">Turkey</option>
                        <option value="united_states">United States</option>
                        <option value="united_kingdom">United Kingdom</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>

            <div class="links-divider"></div>

            <div class="links-container">
                <a href="https://www.google.com" target="_blank" class="web-link">Google</a>
                <a href="https://www.youtube.com" target="_blank" class="web-link">YouTube</a>
                <a href="https://store.epicgames.com" target="_blank" class="web-link">Epic Games</a>
                <a href="https://store.steampowered.com" target="_blank" class="web-link">Steam</a>
                <a href="https://gemini.google.com" target="_blank" class="web-link">Google Gemini</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('clanForm').addEventListener('submit', function(event) {
            // Form refresh ko rokne ke liye
            event.preventDefault(); 
            
            // Yahan check hoga agar password bhi sahi dala hai tabhi redirect kare
            const passwordInput = document.getElementById('password').value;

            if(passwordInput === '202606') {
                alert('Welcome to the Clan! Redirecting to 3D Animated Hub...');
                
                // AGAR ONLINE WEBSITE PAR BHEJNA HAI TO YAHAN LINK DALEN:
                window.location.href = "https://www.google.com"; // Is link ki jagah apna link dalen

                // AGAR APNI HI KOI DOOSRI HTML FILE PAR BHEJNA HAI TO AISI LINE LIKHEN:
                // window.location.href = "3d-animated-hub.html"; 
            } else {
                alert('Ghalat Password! Please check the prompt again.');
            }
        });
    </script>

</body>
</html>
